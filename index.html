<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hodnocení vína</title>
    <style>
        :root {
            --primary-color: #722F37;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 8px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Hlavní hlavička s otočenými texty */
        .header-grid {
            display: grid;
            grid-template-columns: 85px repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            border-bottom: 2px solid var(--primary-color);
        }

        .header-item {
            position: relative;
            height: 110px; /* Prostor pro otočený text */
        }

        .header-item span {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-45deg);
            white-space: nowrap;
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
        }

        /* Nadpis kategorie (Vzhled, Vůně...) */
        .category-title {
            margin-top: 24px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }

        /* Řádek pro jednotlivé parametry */
        .row-grid {
            display: grid;
            grid-template-columns: 85px repeat(5, 1fr);
            gap: 4px;
            align-items: center;
            background: #f1f3f5;
            padding: 12px 0;
            margin-bottom: 8px;
            border-radius: var(--border-radius);
        }

        .row-label {
            font-weight: 600;
            font-size: 0.95rem;
            padding-left: 8px;
            word-break: break-word;
            line-height: 1.2;
        }

        .radio-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .score-number {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 6px;
        }

        .radio-cell input[type="radio"] {
            transform: scale(1.4);
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            margin-top: 24px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #5a252b;
        }

        .results {
            margin-top: 24px;
            padding: 20px;
            background-color: #f1f3f5;
            border-radius: var(--border-radius);
            text-align: center;
            display: none;
        }

        .score-100 {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .score-5 {
            font-size: 1.5rem;
            color: #555;
            margin-top: 8px;
        }

        @media (max-width: 400px) {
            .header-grid, .row-grid {
                grid-template-columns: 75px repeat(5, 1fr); /* Úprava pro velmi malé displeje */
            }
            .header-item span {
                font-size: 0.75rem;
            }
            .row-label {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Degustační lístek</h1>
    
    <form id="wineForm">
        <div class="header-grid">
            <div class="header-item"></div> <div class="header-item"><span>Vynikající</span></div>
            <div class="header-item"><span>Velmi dobré</span></div>
            <div class="header-item"><span>Dobré</span></div>
            <div class="header-item"><span>Uspokojivé</span></div>
            <div class="header-item"><span>Nedostatečné</span></div>
        </div>

        <div class="category-title">Vzhled</div>
        <div class="row-grid">
            <div class="row-label">Čirost</div>
            <label class="radio-cell"><span class="score-number">5</span><input type="radio" name="vzhled_cirost" value="5"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="vzhled_cirost" value="4"></label>
            <label class="radio-cell"><span class="score-number">3</span><input type="radio" name="vzhled_cirost" value="3"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="vzhled_cirost" value="2"></label>
            <label class="radio-cell"><span class="score-number">1</span><input type="radio" name="vzhled_cirost" value="1"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Barva</div>
            <label class="radio-cell"><span class="score-number">10</span><input type="radio" name="vzhled_barva" value="10"></label>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="vzhled_barva" value="8"></label>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="vzhled_barva" value="6"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="vzhled_barva" value="4"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="vzhled_barva" value="2"></label>
        </div>

        <div class="category-title">Vůně</div>
        <div class="row-grid">
            <div class="row-label">Intenzita</div>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="vune_intenzita" value="8"></label>
            <label class="radio-cell"><span class="score-number">7</span><input type="radio" name="vune_intenzita" value="7"></label>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="vune_intenzita" value="6"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="vune_intenzita" value="4"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="vune_intenzita" value="2"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Čistota</div>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="vune_cistota" value="6"></label>
            <label class="radio-cell"><span class="score-number">5</span><input type="radio" name="vune_cistota" value="5"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="vune_cistota" value="4"></label>
            <label class="radio-cell"><span class="score-number">3</span><input type="radio" name="vune_cistota" value="3"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="vune_cistota" value="2"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Harmonie</div>
            <label class="radio-cell"><span class="score-number">16</span><input type="radio" name="vune_harmonie" value="16"></label>
            <label class="radio-cell"><span class="score-number">14</span><input type="radio" name="vune_harmonie" value="14"></label>
            <label class="radio-cell"><span class="score-number">12</span><input type="radio" name="vune_harmonie" value="12"></label>
            <label class="radio-cell"><span class="score-number">10</span><input type="radio" name="vune_harmonie" value="10"></label>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="vune_harmonie" value="8"></label>
        </div>

        <div class="category-title">Chuť</div>
        <div class="row-grid">
            <div class="row-label">Intenzita</div>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="chut_intenzita" value="8"></label>
            <label class="radio-cell"><span class="score-number">7</span><input type="radio" name="chut_intenzita" value="7"></label>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="chut_intenzita" value="6"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="chut_intenzita" value="4"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="chut_intenzita" value="2"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Čistota</div>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="chut_cistota" value="6"></label>
            <label class="radio-cell"><span class="score-number">5</span><input type="radio" name="chut_cistota" value="5"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="chut_cistota" value="4"></label>
            <label class="radio-cell"><span class="score-number">3</span><input type="radio" name="chut_cistota" value="3"></label>
            <label class="radio-cell"><span class="score-number">2</span><input type="radio" name="chut_cistota" value="2"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Harmonie</div>
            <label class="radio-cell"><span class="score-number">22</span><input type="radio" name="chut_harmonie" value="22"></label>
            <label class="radio-cell"><span class="score-number">19</span><input type="radio" name="chut_harmonie" value="19"></label>
            <label class="radio-cell"><span class="score-number">16</span><input type="radio" name="chut_harmonie" value="16"></label>
            <label class="radio-cell"><span class="score-number">13</span><input type="radio" name="chut_harmonie" value="13"></label>
            <label class="radio-cell"><span class="score-number">12</span><input type="radio" name="chut_harmonie" value="12"></label>
        </div>
        <div class="row-grid">
            <div class="row-label">Perzistence</div>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="chut_perzistence" value="8"></label>
            <label class="radio-cell"><span class="score-number">7</span><input type="radio" name="chut_perzistence" value="7"></label>
            <label class="radio-cell"><span class="score-number">6</span><input type="radio" name="chut_perzistence" value="6"></label>
            <label class="radio-cell"><span class="score-number">5</span><input type="radio" name="chut_perzistence" value="5"></label>
            <label class="radio-cell"><span class="score-number">4</span><input type="radio" name="chut_perzistence" value="4"></label>
        </div>

        <div class="category-title">Celkový dojem</div>
        <div class="row-grid">
            <div class="row-label">Dojem z vína</div>
            <label class="radio-cell"><span class="score-number">11</span><input type="radio" name="celkovy_dojem" value="11"></label>
            <label class="radio-cell"><span class="score-number">10</span><input type="radio" name="celkovy_dojem" value="10"></label>
            <label class="radio-cell"><span class="score-number">9</span><input type="radio" name="celkovy_dojem" value="9"></label>
            <label class="radio-cell"><span class="score-number">8</span><input type="radio" name="celkovy_dojem" value="8"></label>
            <label class="radio-cell"><span class="score-number">7</span><input type="radio" name="celkovy_dojem" value="7"></label>
        </div>

        <button type="button" onclick="calculateScore()">Vyhodnotit víno</button>
    </form>

    <div class="results" id="resultsBlock">
        <div class="score-100"><span id="score100">0</span> / 100</div>
        <div class="score-5">Pětibodová stupnice: <strong id="score5">0.0</strong> / 5.0</div>
    </div>
</div>

<script>
    function calculateScore() {
        const checkedRadios = document.querySelectorAll('input[type="radio"]:checked');
        
        if (checkedRadios.length < 10) {
            alert('Prosím, ohodnoťte všechny parametry (celkem jich je 10).');
            return;
        }

        let totalScore = 0;
        
        checkedRadios.forEach(radio => {
            totalScore += parseInt(radio.value);
        });

        const fivePointScore = (totalScore / 20).toFixed(1);

        document.getElementById('score100').innerText = totalScore;
        document.getElementById('score5').innerText = fivePointScore;
        document.getElementById('resultsBlock').style.display = 'block';

        document.getElementById('resultsBlock').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
