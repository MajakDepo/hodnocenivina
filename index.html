<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hodnocení vína</title>
    <style>
        :root {
            --primary-color: #722F37;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 8px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 550px;
            width: 100%;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .group-label {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #444;
        }

        .radio-group {
            display: flex;
            justify-content: space-between;
            background: #f1f3f5;
            padding: 12px 8px;
            border-radius: var(--border-radius);
            gap: 4px;
        }

        .radio-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .score-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .score-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 10px;
            min-height: 2.2rem; /* Zajišťuje, že inputy budou vždy v jedné rovině */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
            hyphens: auto;
            word-break: break-word;
        }

        .radio-item input[type="radio"] {
            transform: scale(1.4);
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .category-title {
            margin-top: 32px;
            margin-bottom: 16px;
            padding-bottom: 4px;
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 1.3rem;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #5a252b;
        }

        .results {
            margin-top: 24px;
            padding: 20px;
            background-color: #f1f3f5;
            border-radius: var(--border-radius);
            text-align: center;
            display: none;
        }

        .score-100 {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .score-5 {
            font-size: 1.5rem;
            color: #555;
            margin-top: 8px;
        }

        @media (min-width: 400px) {
            .score-label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Degustační lístek</h1>
    
    <form id="wineForm">
        <h2 class="category-title">Vzhled</h2>
        <div class="form-group">
            <span class="group-label">Čirost</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">5</span><span class="score-label">Vynikající</span><input type="radio" name="vzhled_cirost" value="5"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Velmi dobré</span><input type="radio" name="vzhled_cirost" value="4"></label>
                <label class="radio-item"><span class="score-number">3</span><span class="score-label">Dobré</span><input type="radio" name="vzhled_cirost" value="3"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Uspokojivé</span><input type="radio" name="vzhled_cirost" value="2"></label>
                <label class="radio-item"><span class="score-number">1</span><span class="score-label">Nedostatečné</span><input type="radio" name="vzhled_cirost" value="1"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Barva</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">10</span><span class="score-label">Vynikající</span><input type="radio" name="vzhled_barva" value="10"></label>
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Velmi dobré</span><input type="radio" name="vzhled_barva" value="8"></label>
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Dobré</span><input type="radio" name="vzhled_barva" value="6"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Uspokojivé</span><input type="radio" name="vzhled_barva" value="4"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Nedostatečné</span><input type="radio" name="vzhled_barva" value="2"></label>
            </div>
        </div>

        <h2 class="category-title">Vůně</h2>
        <div class="form-group">
            <span class="group-label">Intenzita</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Vynikající</span><input type="radio" name="vune_intenzita" value="8"></label>
                <label class="radio-item"><span class="score-number">7</span><span class="score-label">Velmi dobré</span><input type="radio" name="vune_intenzita" value="7"></label>
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Dobré</span><input type="radio" name="vune_intenzita" value="6"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Uspokojivé</span><input type="radio" name="vune_intenzita" value="4"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Nedostatečné</span><input type="radio" name="vune_intenzita" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Čistota</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Vynikající</span><input type="radio" name="vune_cistota" value="6"></label>
                <label class="radio-item"><span class="score-number">5</span><span class="score-label">Velmi dobré</span><input type="radio" name="vune_cistota" value="5"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Dobré</span><input type="radio" name="vune_cistota" value="4"></label>
                <label class="radio-item"><span class="score-number">3</span><span class="score-label">Uspokojivé</span><input type="radio" name="vune_cistota" value="3"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Nedostatečné</span><input type="radio" name="vune_cistota" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Harmonie</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">16</span><span class="score-label">Vynikající</span><input type="radio" name="vune_harmonie" value="16"></label>
                <label class="radio-item"><span class="score-number">14</span><span class="score-label">Velmi dobré</span><input type="radio" name="vune_harmonie" value="14"></label>
                <label class="radio-item"><span class="score-number">12</span><span class="score-label">Dobré</span><input type="radio" name="vune_harmonie" value="12"></label>
                <label class="radio-item"><span class="score-number">10</span><span class="score-label">Uspokojivé</span><input type="radio" name="vune_harmonie" value="10"></label>
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Nedostatečné</span><input type="radio" name="vune_harmonie" value="8"></label>
            </div>
        </div>

        <h2 class="category-title">Chuť</h2>
        <div class="form-group">
            <span class="group-label">Intenzita</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Vynikající</span><input type="radio" name="chut_intenzita" value="8"></label>
                <label class="radio-item"><span class="score-number">7</span><span class="score-label">Velmi dobré</span><input type="radio" name="chut_intenzita" value="7"></label>
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Dobré</span><input type="radio" name="chut_intenzita" value="6"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Uspokojivé</span><input type="radio" name="chut_intenzita" value="4"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Nedostatečné</span><input type="radio" name="chut_intenzita" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Čistota</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Vynikající</span><input type="radio" name="chut_cistota" value="6"></label>
                <label class="radio-item"><span class="score-number">5</span><span class="score-label">Velmi dobré</span><input type="radio" name="chut_cistota" value="5"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Dobré</span><input type="radio" name="chut_cistota" value="4"></label>
                <label class="radio-item"><span class="score-number">3</span><span class="score-label">Uspokojivé</span><input type="radio" name="chut_cistota" value="3"></label>
                <label class="radio-item"><span class="score-number">2</span><span class="score-label">Nedostatečné</span><input type="radio" name="chut_cistota" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Harmonie</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">22</span><span class="score-label">Vynikající</span><input type="radio" name="chut_harmonie" value="22"></label>
                <label class="radio-item"><span class="score-number">19</span><span class="score-label">Velmi dobré</span><input type="radio" name="chut_harmonie" value="19"></label>
                <label class="radio-item"><span class="score-number">16</span><span class="score-label">Dobré</span><input type="radio" name="chut_harmonie" value="16"></label>
                <label class="radio-item"><span class="score-number">13</span><span class="score-label">Uspokojivé</span><input type="radio" name="chut_harmonie" value="13"></label>
                <label class="radio-item"><span class="score-number">12</span><span class="score-label">Nedostatečné</span><input type="radio" name="chut_harmonie" value="12"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Perzistence</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Vynikající</span><input type="radio" name="chut_perzistence" value="8"></label>
                <label class="radio-item"><span class="score-number">7</span><span class="score-label">Velmi dobré</span><input type="radio" name="chut_perzistence" value="7"></label>
                <label class="radio-item"><span class="score-number">6</span><span class="score-label">Dobré</span><input type="radio" name="chut_perzistence" value="6"></label>
                <label class="radio-item"><span class="score-number">5</span><span class="score-label">Uspokojivé</span><input type="radio" name="chut_perzistence" value="5"></label>
                <label class="radio-item"><span class="score-number">4</span><span class="score-label">Nedostatečné</span><input type="radio" name="chut_perzistence" value="4"></label>
            </div>
        </div>

        <h2 class="category-title">Celkový dojem</h2>
        <div class="form-group">
            <span class="group-label">Celkový dojem z vína</span>
            <div class="radio-group">
                <label class="radio-item"><span class="score-number">11</span><span class="score-label">Vynikající</span><input type="radio" name="celkovy_dojem" value="11"></label>
                <label class="radio-item"><span class="score-number">10</span><span class="score-label">Velmi dobré</span><input type="radio" name="celkovy_dojem" value="10"></label>
                <label class="radio-item"><span class="score-number">9</span><span class="score-label">Dobré</span><input type="radio" name="celkovy_dojem" value="9"></label>
                <label class="radio-item"><span class="score-number">8</span><span class="score-label">Uspokojivé</span><input type="radio" name="celkovy_dojem" value="8"></label>
                <label class="radio-item"><span class="score-number">7</span><span class="score-label">Nedostatečné</span><input type="radio" name="celkovy_dojem" value="7"></label>
            </div>
        </div>

        <button type="button" onclick="calculateScore()">Vyhodnotit víno</button>
    </form>

    <div class="results" id="resultsBlock">
        <div class="score-100"><span id="score100">0</span> / 100</div>
        <div class="score-5">Pětibodová stupnice: <strong id="score5">0.0</strong> / 5.0</div>
    </div>
</div>

<script>
    function calculateScore() {
        const checkedRadios = document.querySelectorAll('input[type="radio"]:checked');
        
        if (checkedRadios.length < 10) {
            alert('Prosím, ohodnoťte všechny parametry (celkem jich je 10).');
            return;
        }

        let totalScore = 0;
        
        checkedRadios.forEach(radio => {
            totalScore += parseInt(radio.value);
        });

        const fivePointScore = (totalScore / 20).toFixed(1);

        document.getElementById('score100').innerText = totalScore;
        document.getElementById('score5').innerText = fivePointScore;
        document.getElementById('resultsBlock').style.display = 'block';

        document.getElementById('resultsBlock').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
