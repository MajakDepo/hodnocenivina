<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hodnocení vína</title>
    <style>
        :root {
            --primary-color: #722F37;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 8px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .group-label {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #444;
        }

        .radio-group {
            display: flex;
            justify-content: space-between;
            background: #f1f3f5;
            padding: 12px 16px;
            border-radius: var(--border-radius);
        }

        .radio-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .radio-item span {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .radio-item input[type="radio"] {
            transform: scale(1.5); /* Zvětšení pro snazší dotyk na mobilu */
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .category-title {
            margin-top: 32px;
            margin-bottom: 16px;
            padding-bottom: 4px;
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 1.3rem;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #5a252b;
        }

        .results {
            margin-top: 24px;
            padding: 20px;
            background-color: #f1f3f5;
            border-radius: var(--border-radius);
            text-align: center;
            display: none;
        }

        .score-100 {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .score-5 {
            font-size: 1.5rem;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Degustační lístek</h1>
    
    <form id="wineForm">
        <h2 class="category-title">Vzhled</h2>
        <div class="form-group">
            <span class="group-label">Čirost</span>
            <div class="radio-group">
                <label class="radio-item"><span>5</span><input type="radio" name="vzhled_cirost" value="5"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="vzhled_cirost" value="4"></label>
                <label class="radio-item"><span>3</span><input type="radio" name="vzhled_cirost" value="3"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="vzhled_cirost" value="2"></label>
                <label class="radio-item"><span>1</span><input type="radio" name="vzhled_cirost" value="1"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Barva</span>
            <div class="radio-group">
                <label class="radio-item"><span>10</span><input type="radio" name="vzhled_barva" value="10"></label>
                <label class="radio-item"><span>8</span><input type="radio" name="vzhled_barva" value="8"></label>
                <label class="radio-item"><span>6</span><input type="radio" name="vzhled_barva" value="6"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="vzhled_barva" value="4"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="vzhled_barva" value="2"></label>
            </div>
        </div>

        <h2 class="category-title">Vůně</h2>
        <div class="form-group">
            <span class="group-label">Intenzita</span>
            <div class="radio-group">
                <label class="radio-item"><span>8</span><input type="radio" name="vune_intenzita" value="8"></label>
                <label class="radio-item"><span>7</span><input type="radio" name="vune_intenzita" value="7"></label>
                <label class="radio-item"><span>6</span><input type="radio" name="vune_intenzita" value="6"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="vune_intenzita" value="4"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="vune_intenzita" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Čistota</span>
            <div class="radio-group">
                <label class="radio-item"><span>6</span><input type="radio" name="vune_cistota" value="6"></label>
                <label class="radio-item"><span>5</span><input type="radio" name="vune_cistota" value="5"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="vune_cistota" value="4"></label>
                <label class="radio-item"><span>3</span><input type="radio" name="vune_cistota" value="3"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="vune_cistota" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Harmonie</span>
            <div class="radio-group">
                <label class="radio-item"><span>16</span><input type="radio" name="vune_harmonie" value="16"></label>
                <label class="radio-item"><span>14</span><input type="radio" name="vune_harmonie" value="14"></label>
                <label class="radio-item"><span>12</span><input type="radio" name="vune_harmonie" value="12"></label>
                <label class="radio-item"><span>10</span><input type="radio" name="vune_harmonie" value="10"></label>
                <label class="radio-item"><span>8</span><input type="radio" name="vune_harmonie" value="8"></label>
            </div>
        </div>

        <h2 class="category-title">Chuť</h2>
        <div class="form-group">
            <span class="group-label">Intenzita</span>
            <div class="radio-group">
                <label class="radio-item"><span>8</span><input type="radio" name="chut_intenzita" value="8"></label>
                <label class="radio-item"><span>7</span><input type="radio" name="chut_intenzita" value="7"></label>
                <label class="radio-item"><span>6</span><input type="radio" name="chut_intenzita" value="6"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="chut_intenzita" value="4"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="chut_intenzita" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Čistota</span>
            <div class="radio-group">
                <label class="radio-item"><span>6</span><input type="radio" name="chut_cistota" value="6"></label>
                <label class="radio-item"><span>5</span><input type="radio" name="chut_cistota" value="5"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="chut_cistota" value="4"></label>
                <label class="radio-item"><span>3</span><input type="radio" name="chut_cistota" value="3"></label>
                <label class="radio-item"><span>2</span><input type="radio" name="chut_cistota" value="2"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Harmonie</span>
            <div class="radio-group">
                <label class="radio-item"><span>22</span><input type="radio" name="chut_harmonie" value="22"></label>
                <label class="radio-item"><span>19</span><input type="radio" name="chut_harmonie" value="19"></label>
                <label class="radio-item"><span>16</span><input type="radio" name="chut_harmonie" value="16"></label>
                <label class="radio-item"><span>13</span><input type="radio" name="chut_harmonie" value="13"></label>
                <label class="radio-item"><span>12</span><input type="radio" name="chut_harmonie" value="12"></label>
            </div>
        </div>
        <div class="form-group">
            <span class="group-label">Perzistence</span>
            <div class="radio-group">
                <label class="radio-item"><span>8</span><input type="radio" name="chut_perzistence" value="8"></label>
                <label class="radio-item"><span>7</span><input type="radio" name="chut_perzistence" value="7"></label>
                <label class="radio-item"><span>6</span><input type="radio" name="chut_perzistence" value="6"></label>
                <label class="radio-item"><span>5</span><input type="radio" name="chut_perzistence" value="5"></label>
                <label class="radio-item"><span>4</span><input type="radio" name="chut_perzistence" value="4"></label>
            </div>
        </div>

        <h2 class="category-title">Celkový dojem</h2>
        <div class="form-group">
            <span class="group-label">Celkový dojem z vína</span>
            <div class="radio-group">
                <label class="radio-item"><span>11</span><input type="radio" name="celkovy_dojem" value="11"></label>
                <label class="radio-item"><span>10</span><input type="radio" name="celkovy_dojem" value="10"></label>
                <label class="radio-item"><span>9</span><input type="radio" name="celkovy_dojem" value="9"></label>
                <label class="radio-item"><span>8</span><input type="radio" name="celkovy_dojem" value="8"></label>
                <label class="radio-item"><span>7</span><input type="radio" name="celkovy_dojem" value="7"></label>
            </div>
        </div>

        <button type="button" onclick="calculateScore()">Vyhodnotit víno</button>
    </form>

    <div class="results" id="resultsBlock">
        <div class="score-100"><span id="score100">0</span> / 100</div>
        <div class="score-5">Pětibodová stupnice: <strong id="score5">0.0</strong> / 5.0</div>
    </div>
</div>

<script>
    function calculateScore() {
        // Získání všech zaškrtnutých radio buttonů
        const checkedRadios = document.querySelectorAll('input[type="radio"]:checked');
        
        // Kontrola, zda bylo ohodnoceno všech 10 parametrů
        if (checkedRadios.length < 10) {
            alert('Prosím, ohodnoťte všechny parametry (celkem jich je 10).');
            return;
        }

        let totalScore = 0;
        
        // Součet všech hodnot
        checkedRadios.forEach(radio => {
            totalScore += parseInt(radio.value);
        });

        // Převod na 5 bodovou stupnici (100 bodů = 5.0)
        const fivePointScore = (totalScore / 20).toFixed(1);

        // Zobrazení výsledků
        document.getElementById('score100').innerText = totalScore;
        document.getElementById('score5').innerText = fivePointScore;
        document.getElementById('resultsBlock').style.display = 'block';

        // Rolování k výsledkům
        document.getElementById('resultsBlock').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
